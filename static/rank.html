<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coordinate Plane Geometry – Rankings</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="lang-switch-wrap">
      <button type="button" class="lang-btn" data-lang="en">EN</button>
      <span class="lang-sep">|</span>
      <button type="button" class="lang-btn" data-lang="zh">中文</button>
    </div>
    <header class="rank-header">
      <h1 data-i18n="rankTitle">Leaderboard</h1>
      <p data-i18n="rankSubtitle">Coordinate Plane Geometry – Top scores</p>
    </header>

    <table class="rank-table">
      <thead>
        <tr>
          <th class="rank-num" data-i18n="rankNum">#</th>
          <th data-i18n="rankPlayer">Player</th>
          <th class="score-cell" data-i18n="rankScore">Score</th>
          <th data-i18n="rankDate">Date</th>
        </tr>
      </thead>
      <tbody id="rank-body">
        <tr><td colspan="4" class="empty-rank" data-i18n="rankLoading">Loading…</td></tr>
      </tbody>
    </table>

    <p class="nav-links"><a href="/" data-i18n="playGame">Play game</a></p>
  </div>
  <script>
    (function () {
      var LOCALE = {
        en: {
          rankTitle: "Leaderboard",
          rankSubtitle: "Coordinate Plane Geometry – Top scores",
          rankNum: "#",
          rankPlayer: "Player",
          rankScore: "Score",
          rankDate: "Date",
          rankLoading: "Loading…",
          rankEmpty: "No scores yet. ",
          rankPlayFirst: "Play first!",
          rankError: "Could not load rankings.",
          playGame: "Play game",
        },
        zh: {
          rankTitle: "排行榜",
          rankSubtitle: "坐標平面幾何 – 最高分",
          rankNum: "名次",
          rankPlayer: "玩家",
          rankScore: "分數",
          rankDate: "日期",
          rankLoading: "載入中…",
          rankEmpty: "尚無成績。",
          rankPlayFirst: "先去玩一局！",
          rankError: "無法載入排行榜。",
          playGame: "進入遊戲",
        },
      };
      var lang = (typeof localStorage !== "undefined" && localStorage.getItem("coordQuestLang")) || "en";
      if (lang !== "zh") lang = "en";

      function t(key) { return (LOCALE[lang] || LOCALE.en)[key] || LOCALE.en[key] || key; }
      function updateUIText() {
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (!key) return;
          el.textContent = t(key);
        });
        document.querySelectorAll("[data-lang]").forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-lang") === lang);
        });
      }

      document.querySelectorAll("[data-lang]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var l = btn.getAttribute("data-lang");
          if (l !== "en" && l !== "zh") return;
          lang = l;
          if (typeof localStorage !== "undefined") localStorage.setItem("coordQuestLang", lang);
          updateUIText();
          updateRankBodyText();
        });
      });

      function updateRankBodyText() {
        var emptyRow = document.querySelector("#rank-body tr.empty-rank");
        if (emptyRow && emptyRow.cells && emptyRow.cells[0]) {
          var cell = emptyRow.cells[0];
          var msg = cell.getAttribute("data-msg");
          cell.innerHTML = "";
          if (msg === "empty") {
            cell.appendChild(document.createTextNode(t("rankEmpty")));
            var link = document.createElement("a");
            link.href = "/";
            link.textContent = t("rankPlayFirst");
            cell.appendChild(link);
          } else if (msg === "error") cell.textContent = t("rankError");
          else cell.textContent = t("rankLoading");
        }
      }

      var tbody = document.getElementById("rank-body");
      fetch("/api/rank")
        .then(function (r) { return r.json(); })
        .then(function (rows) {
          tbody.innerHTML = "";
          if (rows.length === 0) {
            var tr = document.createElement("tr");
            var td = document.createElement("td");
            td.colSpan = 4;
            td.className = "empty-rank";
            td.setAttribute("data-msg", "empty");
            td.textContent = t("rankEmpty");
            var link = document.createElement("a");
            link.href = "/";
            link.textContent = t("rankPlayFirst");
            td.appendChild(link);
            tr.appendChild(td);
            tbody.appendChild(tr);
            return;
          }
          rows.forEach(function (row, i) {
            var tr = document.createElement("tr");
            var date = row.created_at ? new Date(row.created_at).toLocaleDateString() : "—";
            tr.innerHTML =
              "<td class=\"rank-num\">" + (i + 1) + "</td>" +
              "<td>" + escapeHtml(row.player_name || "Anonymous") + "</td>" +
              "<td class=\"score-cell\">" + row.score + " / " + row.total + "</td>" +
              "<td>" + escapeHtml(date) + "</td>";
            tbody.appendChild(tr);
          });
        })
        .catch(function () {
          tbody.innerHTML = "<tr><td colspan=\"4\" class=\"empty-rank\" data-msg=\"error\"></td></tr>";
          tbody.querySelector("td").textContent = t("rankError");
        });

      function escapeHtml(s) {
        var div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      updateUIText();
    })();
  </script>
</body>
</html>
